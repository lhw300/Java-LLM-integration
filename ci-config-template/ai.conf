# ==========================================
# 🚀 系统运行模式配置 (Model Linkage Type)
# ==========================================
# 可选值: hybrid2 (本地+云端混合), qwen-online (全云端), openai, ollama
system.run.type=hybrid2
# true=启动时预热所有模型连接，false=跳过（适合快速调试）
system.warmup.enabled=false

#hybrid2
#Rewrite (Qwen Online turbo)：将原始问题重写为 refined_query。
#Embedding (本地 DJL)：调用 text2vec-base-chinese 对重写后的问题进行向量化。
#Retrieve (Lucene)：在本地索引中搜索。
#Rerank (本地 DJL)：使用 bge-reranker-v2-m3 进行精排。
#Final Ask (Qwen Online)：生成最终回答。


#
#
#
#
#




# ==========================================
# 🎛️ RAG 检索链路模式配置
# ==========================================
# 支持的模式: 
#   - retrieveRerank : 粗排 + 精排 (默认标准模式)
#   - retrieveOnly   : 仅粗排 (跳过 Rerank，极速响应)
#   - fullText       : 全量知识库模式 (无检索，直接喂全量文本)
rag.query.mode=fullText  

# ==========================================
# 🔑 API Keys 配置
# ==========================================
# 阿里云百炼 API Key
api.key.qwen=

# OpenAI API Key (如果使用)
api.key.openai= 

# ==========================================
# 🎛️ RAG 核心路由与拦截阈值配置
# ==========================================

# 1. 最终拒答防线：若精排后的最优距离 > 此值，直接拦截并回复“未找到”
rag.threshold.similarity=0.82

# 2. 信任快道：若粗排距离 < 此值，视为完美匹配，跳过本地精排以极速响应
rag.threshold.trust=0.25

# 3. 误杀抢救(粗排资格线)：粗排距离必须 < 此值，才有资格触发抢救
rag.threshold.comp_embed=0.45

# 4. 误杀抢救(精排触发线)：满足粗排资格且精排分数极差(> 此值)，触发强制拉回
rag.threshold.comp_rerank=0.80

# 触发补偿机制后，强行赋予的及格距离分数 (需小于最终拒答防线)
rag.threshold.rescue_score=0.60
 
# 允许进入精排池的最大距离 (距离 > 此值直接淘汰，不送去精排)
rag.threshold.rerank_trigger_max=0.60

 

# ==========================================
# ⚙️ 并发、数量与超时控制
# ==========================================

# 本地精排候选池：从粗排最多取 N 条进入本地打分
rag.limit.max_rerank=5

# 云端上下文限制：最终只取前 N 条发往云端大模型
rag.limit.final_limit=3

# 精排熔断时长(秒)：异步精排最多等待的时间
rag.timeout.rerank=5

# ==========================================
# 📂 文件与依赖路径配置
# ==========================================

# Prompt 文件路径,querymode=fullText时，rewrite,rerank是用不到的
path.prompt.rewrite=/config/prompt_rewritequery_v1_publish.txt
path.prompt.rerank=/config/prompt_rerank_v1_publish.txt



path.prompt.ask=/config/prompt_finalask_v2_publish.txt
path.prompt.chitchat=/config/publish_chitchat.txt
path.prompt.classify=/config/prompt_classify_v2_en_category.txt


# ------------------------------------------
# 💾 存储方案配置 (Storage Strategy)
# ------------------------------------------
# 可选值: lucene (本地文件) 或 postgres (云端/本地数据库)
storage.type=lucene


# 知识库与索引路径
path.knowledge=/config/publishknowledge.txt
path.lucene=/lucene_index


# ==========================================
# 🧠 DJL Local Model Configurations
# ==========================================
# ==========================================
# 🧠 DJL Local Model Configurations
# ==========================================

# 模型目录名称 (代码会自动拼接在 configPath 之后)
djl.model.rerank.name=bge-reranker-v2-m3
djl.model.embed.name=text2vec-base-chinese-paraphrase-pt

# 模型参数
djl.model.embed.dimension=768
djl.rerank.temperature=0.5


# ==========================================
# 💾 数据库配置 (Postgres pgvector)
# ==========================================
db.postgres.url=jdbc:postgresql://localhost:5432/postgres
db.postgres.user=postgres
db.postgres.password=call
db.postgres.pool.max=10
db.postgres.pool.keepalive=60000

# 测试用的表名（可选）
db.postgres.table.online=enterprise_knowledge_qwen_1024


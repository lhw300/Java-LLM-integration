name: Java_CI_Automation

on:
  push:
    branches: [ "main" ]  # Trigger on every push to main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # The GitHub Virtual Machine

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compile and Test
      run: mvn test  # This runs your Java unit tests
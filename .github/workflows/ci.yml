name: CI - Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # Job 1：构建（两个测试 job 共用这个产物）
  # ============================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Remove local-copy antrun plugin
        run: |
          python3 - <<'EOF'
          import re, pathlib
          p = pathlib.Path('pom.xml')
          content = p.read_text()
          content = re.sub(
            r'\s*<plugin>[\s\S]*?maven-antrun-plugin[\s\S]*?</plugin>',
            '', content)
          p.write_text(content)
          EOF

      - name: Build fat jar
        run: mvn -B package -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: lcallai-jar
          path: |
            target/lcallai-1.0.jar
            target/lcallai-1.0-lib.jar

  # ============================================================
  # Job 2：意图分类测试（对应 ChatIntentExample）
  # ============================================================
  test-intent:
    runs-on: ubuntu-latest
    needs: build
    env:
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      AI_CONFIG_PATH: ${{ github.workspace }}/ci-config

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: lcallai-jar
          path: target/

      - name: Prepare CI config
        run: |
          mkdir -p ${{ github.workspace }}/ci-config
          cp -r ${{ github.workspace }}/ci-config-template/. ${{ github.workspace }}/ci-config/ 2>/dev/null || true
          echo "api.key.qwen=${QWEN_API_KEY}" >> ${{ github.workspace }}/ci-config/ai.conf

      - name: Run IntentTestRunner
        run: |
          java -cp "target/lcallai-1.0.jar:target/lcallai-1.0-lib.jar" \
               com.lcallai.IntentTestRunner \
               ${{ github.workspace }}/ci-config

  # ============================================================
  # Job 3：RAG 端到端测试（对应 ChatPublishExample）
  # ============================================================
  test-rag:
    runs-on: ubuntu-latest
    needs: build
    env:
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      AI_CONFIG_PATH: ${{ github.workspace }}/ci-config

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: lcallai-jar
          path: target/

      - name: Prepare CI config
        run: |
          mkdir -p ${{ github.workspace }}/ci-config
          cp -r ${{ github.workspace }}/ci-config-template/. ${{ github.workspace }}/ci-config/ 2>/dev/null || true
          echo "api.key.qwen=${QWEN_API_KEY}" >> ${{ github.workspace }}/ci-config/ai.conf

      - name: Run RagTestRunner
        run: |
          java -cp "target/lcallai-1.0.jar:target/lcallai-1.0-lib.jar" \
               com.lcallai.RagTestRunner \
               ${{ github.workspace }}/ci-config
